<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#f2efea"/>

  <!-- 装饰性网格 -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- 中心文字 -->
  <text x="600" y="280" font-family="serif" font-size="80" font-weight="bold" fill="#991b1b" text-anchor="middle">沪漫工厂</text>
  <text x="600" y="350" font-family="serif" font-size="36" fill="#1a1a1a" text-anchor="middle">让中国动画的"精气神"焕发新生</text>

  <!-- 底部装饰 -->
  <text x="600" y="580" font-family="serif" font-size="24" fill="#991b1b" text-anchor="middle" opacity="0.6">human-ai-factory.github.io</text>

  <!-- 装饰线条 -->
  <line x1="200" y1="400" x2="1000" y2="400" stroke="#991b1b" stroke-opacity="0.2" stroke-width="2"/>
</svg>
